<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
    
    <div class="s-12 padding-2x text-size-30 text-uppercase heading-mix text-content">
        <f:if condition="{data.bodytext}">
            <f:format.html>{data.bodytext}</f:format.html>
        </f:if>
    </div>
    <f:if condition="{data.gallery}">
        <section class="grid margin gallery-section">
            <f:for each="{data.gallery}" as="item">
                <f:if condition="{item.image.0.link}">
                    <f:then>
                        <f:link.typolink parameter="{item.image.0.link}" class="s-12 m-6 margin-bottom">
                            <f:image image="{item.image.0}" class="full-img" maxWidth="750" maxHeight="375" />
                        </f:link.typolink>
                    </f:then>
                    <f:else>
                        <f:image image="{item.image.0}" class="s-12 m-6 margin-bottom" maxWidth="750" maxHeight="375" />
                    </f:else>
                </f:if>
            </f:for>
        </section>
    </f:if>

</html>
