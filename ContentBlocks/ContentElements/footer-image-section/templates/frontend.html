<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
      
    <f:if condition="{data.image.0}">
        <f:variable name="src"><f:uri.image image="{data.image.0}" treatIdAsReference="1" /></f:variable>
    </f:if>
    <f:if condition="{data.image.0.link}">
        <f:then>
            <f:link.typolink parameter="{data.image.0.link}">
                <div class="background-image" style="height:100%;background-image:url('{src}')"></div>
            </f:link.typolink>
        </f:then>
        <f:else>
            <div class="background-image" style="height:100%;background-image:url('{src}')"></div>
        </f:else>
    </f:if>
</html>
