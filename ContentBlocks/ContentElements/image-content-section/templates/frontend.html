<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
    
    <section class="grid {f:if(condition: '{data.gap}', then: '', else: 'margin')} text-content" >
        <f:if condition="{data.textarea}">
            <div class="s-12 padding-2x text-uppercase">
                <f:format.html>{data.textarea}</f:format.html>
            </div>
        </f:if>
        <f:if condition="{data.image.0} && {data.select}">
            <f:image image="{data.image.0}" class="s-12 m-6 {f:if(condition: '{data.gap}', then: '', else: 'margin-bottom')}" maxWidth="760" />
        </f:if>
        <f:if condition="{data.bodytext}">
            <div class="s-12 m-6 padding-2x {f:if(condition: '{data.gap}', then: '', else: 'margin-bottom')} background-blue content-box" style="background-color: {data.color1} !important;">
                <f:format.html>{data.bodytext}</f:format.html>
            </div>
        </f:if>
        <f:if condition="{data.image.0} && !{data.select}">
            <f:image image="{data.image.0}" class="s-12 m-6 {f:if(condition: '{data.gap}', then: '', else: 'margin-bottom')}" maxWidth="760" />
        </f:if>
    </section>
</html>
