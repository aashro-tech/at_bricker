categories:
  BrickerTemplate:
    label: 'Bricker Themes'
  Bricker.templates:
    label: 'Templates'
    parent: BrickerTemplate
  Bricker.header:
    label: 'Header Configuration'
    parent: BrickerTemplate

settings:
  bricker.logo:
    label: 'Logo'
    category: Bricker.header
    description: 'Add path for header logo.' 
    type: string
    default: ''
  bricker.logolink:
    label: 'Logo link'
    category: Bricker.header
    description: 'Add page id for header logo link.' 
    type: string
    default: ''
  bricker.templateRootPath: 
    label: 'Templates'
    category: Bricker.templates
    description: 'Path to template root' 
    type: string 
    default: 'EXT:at_bricker/Resources/Private/Templates/' 
  bricker.partialRootPath:
    label: 'Partials'
    category: Bricker.templates
    description: 'Path to partial root'
    type: string
    default: 'EXT:at_bricker/Resources/Private/Partials/'
  bricker.layoutRootPath:
    label: 'Layouts'
    category: Bricker.templates
    description: 'Path to layout root'
    type: string
    default: 'EXT:at_bricker/Resources/Private/Layouts/'
